<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Headless Horsemen</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-base: #060b14;
      --bg-surface: #0c1220;
      --bg-input: #0f1628;
      --border-base: #1a2540;
      --border-subtle: #243354;
      --text-primary: #f0f4ff;
      --text-body: #94a3b8;
      --text-muted: #64748b;
      --text-dim: #475569;
      --accent: #60a5fa;
      --accent-hover: #3b82f6;
      --active-pill-bg: #1e3a5f;
      --active-pill-text: #bfdbfe;
      --glow-sm: 0 0 8px rgba(96,165,250,0.08);
      --glow-md: 0 0 14px rgba(96,165,250,0.12);
      --glow-lg: 0 0 20px rgba(96,165,250,0.15);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'JetBrains Mono', monospace; background: var(--bg-base); color: var(--text-body); min-height: 100vh; font-size: 14px; }
    body::after { content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; background: repeating-linear-gradient(to bottom, transparent 0px, transparent 2px, rgba(96,165,250,0.015) 2px, rgba(96,165,250,0.015) 4px); }
    body::before { content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9998; background: radial-gradient(ellipse at center, transparent 50%, rgba(6,11,20,0.4) 100%); }
    .container { max-width: 640px; margin: 0 auto; padding: 2rem 1rem; }
    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border-base); }
    .header-left { display: flex; align-items: center; gap: 0.6rem; }
    .header-logo { width: 44px; height: 44px; filter: drop-shadow(0 0 6px rgba(96,165,250,0.3)); }
    header h1 { font-size: 1.5rem; font-weight: 700; color: var(--text-primary); text-transform: uppercase; letter-spacing: 0.02em; text-shadow: 0 0 20px rgba(96,165,250,0.15); }
    header span { font-size: 0.75rem; color: var(--text-dim); background: var(--bg-surface); padding: 0.25rem 0.5rem; border-radius: 4px; border: 1px solid var(--border-subtle); }

    .form-group { margin-bottom: 1rem; }
    label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.35rem; text-transform: uppercase; letter-spacing: 0.06em; }
    input, textarea { width: 100%; padding: 0.65rem 0.75rem; background: var(--bg-input); border: 1px solid var(--border-subtle); border-radius: 6px; color: var(--text-primary); font-family: 'JetBrains Mono', monospace; font-size: 0.9rem; outline: none; transition: border-color 0.15s, box-shadow 0.15s; }
    input:focus, textarea:focus { border-color: var(--accent); box-shadow: var(--glow-md); }
    textarea { resize: vertical; min-height: 60px; }

    button { padding: 0.7rem 1.5rem; background: var(--accent); color: var(--bg-base); border: none; border-radius: 6px; font-family: 'JetBrains Mono', monospace; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: background 0.15s, box-shadow 0.2s, transform 0.15s; }
    button:hover { background: var(--accent-hover); box-shadow: var(--glow-lg); transform: translateY(-1px); }
    button:disabled { background: var(--border-base); color: var(--text-dim); cursor: not-allowed; box-shadow: none; transform: none; }

    .section { margin-top: 1.5rem; padding: 1rem; background: var(--bg-surface); border: 1px solid var(--border-base); border-radius: 8px; box-shadow: var(--glow-sm); }
    .section h2 { font-size: 1rem; margin-bottom: 0.75rem; color: var(--text-body); text-transform: uppercase; letter-spacing: 0.06em; }

    .status-bar { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.75rem; }
    .status-text { font-size: 0.9rem; }
    .spinner { width: 18px; height: 18px; border: 2px solid var(--border-base); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .progress-bar { width: 100%; height: 4px; background: var(--border-base); border-radius: 2px; overflow: hidden; margin-bottom: 1rem; }
    .progress-fill { height: 100%; background: var(--accent); transition: width 0.3s ease; border-radius: 2px; box-shadow: 0 0 8px rgba(96,165,250,0.4); }

    .step-list { list-style: none; }
    .step-list li { padding: 0.35rem 0; font-size: 0.85rem; color: var(--text-muted); display: flex; align-items: flex-start; gap: 0.5rem; }
    .step-list li.done { color: #4ade80; }
    .step-list li.current { color: var(--accent); font-weight: 600; text-shadow: 0 0 10px rgba(96,165,250,0.2); }
    .step-list li.pending { color: var(--text-dim); }
    .step-icon { flex-shrink: 0; width: 1.1em; text-align: center; }

    video { width: 100%; border-radius: 6px; background: #000; margin-bottom: 0.75rem; border: 1px solid var(--border-base); box-shadow: var(--glow-md); }

    .memory-badge { display: flex; align-items: center; gap: 0.5rem; padding: 0.4rem 0.75rem; background: rgba(96,165,250,0.06); border: 1px solid rgba(96,165,250,0.15); border-radius: 6px; margin-bottom: 0.75rem; font-size: 0.78rem; color: var(--accent); }
    .memory-badge a { color: var(--accent); text-decoration: none; font-weight: 600; }
    .memory-badge a:hover { text-decoration: underline; }

    .error-banner { background: #1a0f1f; border: 1px solid #5c2040; color: #f87171; padding: 0.75rem 1rem; border-radius: 6px; margin-top: 1rem; font-size: 0.9rem; }

    .btn-row { display: flex; gap: 0.75rem; margin-top: 0.75rem; }
    .btn-secondary { background: var(--bg-input); color: var(--text-body); }
    .btn-secondary:hover { background: var(--border-base); }

    .hidden { display: none !important; }

    .options-section { margin-bottom: 1.25rem; }
    .opt-row { margin-bottom: 1rem; }
    .opt-label { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.4rem; display: flex; align-items: center; gap: 0.35rem; text-transform: uppercase; letter-spacing: 0.06em; }
    .opt-label a { color: var(--accent); text-decoration: none; font-size: 0.7rem; }
    .opt-label a:hover { text-decoration: underline; }

    .seg-control { display: flex; background: var(--bg-input); border: 1px solid var(--border-base); border-radius: 8px; padding: 3px; gap: 2px; }
    .seg-btn { flex: 1; padding: 0.4rem 0.5rem; background: transparent; border: none; border-radius: 6px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; font-weight: 500; cursor: pointer; transition: all 0.15s; text-align: center; white-space: nowrap; }
    .seg-btn:hover { color: var(--text-body); }
    .seg-btn.active { background: var(--accent); color: var(--bg-base); box-shadow: var(--glow-sm); }

    .music-pills { display: flex; flex-wrap: wrap; gap: 6px; }
    .music-pill { padding: 0.35rem 0.7rem; background: var(--bg-input); border: 1px solid var(--border-base); border-radius: 20px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; font-size: 0.73rem; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
    .music-pill:hover { border-color: var(--border-subtle); color: var(--text-body); }
    .music-pill.active { background: var(--active-pill-bg); border-color: var(--accent); color: var(--active-pill-text); box-shadow: var(--glow-sm); }

    .header-badges { display: flex; gap: 0.5rem; align-items: center; }
    .badge-link { font-size: 0.75rem; color: var(--text-dim); background: var(--bg-surface); padding: 0.25rem 0.5rem; border-radius: 4px; border: 1px solid var(--border-subtle); text-decoration: none; transition: border-color 0.15s, color 0.15s; }
    .badge-link:hover { border-color: var(--accent); color: var(--text-body); }

    .powered-by { position: fixed; top: 1rem; right: 1rem; display: flex; align-items: center; gap: 0.75rem; z-index: 100; }
    .powered-by span { font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; }
    .powered-by a { display: flex; align-items: center; opacity: 0.5; transition: opacity 0.2s; }
    .powered-by a:hover { opacity: 1; }
    .powered-by img { height: 28px; width: 28px; border-radius: 6px; object-fit: cover; filter: grayscale(1) brightness(1.6); transition: filter 0.2s; }
    .powered-by a:hover img { filter: grayscale(0) brightness(1); }

    footer { margin-top: 2.5rem; padding-top: 1rem; border-top: 1px solid var(--border-base); text-align: center; font-size: 0.75rem; color: var(--text-dim); }
    footer a { color: var(--text-body); text-decoration: none; transition: color 0.15s; }
    footer a:hover { color: var(--accent); }
    footer span { color: var(--text-dim); }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="header-left">
        <img src="/logo.png" alt="Headless Horsemen" class="header-logo" />
        <h1>Headless Horsemen</h1>
      </div>
      <div class="header-badges">
        <span>Gemini Hackathon</span>
        <a href="https://github.com/lorenjphillips/headless-horsemen" target="_blank" rel="noopener" class="badge-link">
          <span><svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor" style="vertical-align:-2px;margin-right:4px"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>GitHub</span>
        </a>
      </div>
    </header>

    <div class="powered-by">
      <span>Powered by</span>
      <a href="https://ai.google.dev/" target="_blank" rel="noopener"><img src="/sponsors/gemini-square.png" alt="Google Gemini" /></a>
      <a href="https://www.browserbase.com/" target="_blank" rel="noopener"><img src="/sponsors/browserbase-square.jpg" alt="Browserbase" /></a>
      <a href="https://www.trychroma.com/" target="_blank" rel="noopener"><img src="/sponsors/chroma-square.png" alt="Chroma" /></a>
    </div>

    <!-- Input form -->
    <div id="form-section">
      <div class="form-group">
        <label for="site-url">Website URL</label>
        <input id="site-url" type="url" placeholder="https://example.com" value="" />
      </div>
      <div class="form-group">
        <label for="demo-task">What should the demo show?</label>
        <textarea id="demo-task" placeholder="Navigate to the pricing page and compare plans"></textarea>
      </div>
      <div class="options-section">
        <div class="opt-row">
          <div class="opt-label">Quality</div>
          <div class="seg-control" id="opt-quality" data-value="medium">
            <button class="seg-btn" data-val="low" onclick="setSeg(this)">Low</button>
            <button class="seg-btn active" data-val="medium" onclick="setSeg(this)">Medium</button>
            <button class="seg-btn" data-val="high" onclick="setSeg(this)">High</button>
          </div>
        </div>
        <div class="opt-row">
          <div class="opt-label">Speed</div>
          <div class="seg-control" id="opt-speed" data-value="normal">
            <button class="seg-btn" data-val="slow" onclick="setSeg(this)">Slow</button>
            <button class="seg-btn active" data-val="normal" onclick="setSeg(this)">Normal</button>
            <button class="seg-btn" data-val="fast" onclick="setSeg(this)">Fast</button>
          </div>
        </div>
        <div class="opt-row">
          <div class="opt-label">
            Background Music
            <a href="https://deepmind.google/models/lyria/" target="_blank" rel="noopener">Lyria 3</a>
          </div>
          <div class="music-pills" id="opt-music" data-value="">
            <button class="music-pill active" data-val="" onclick="setMusic(this)">None</button>
            <button class="music-pill" data-val="lofi-chill" onclick="setMusic(this)">Lo-fi Chill</button>
            <button class="music-pill" data-val="upbeat-tech" onclick="setMusic(this)">Upbeat Tech</button>
            <button class="music-pill" data-val="ambient-focus" onclick="setMusic(this)">Ambient Focus</button>
            <button class="music-pill" data-val="cinematic-reveal" onclick="setMusic(this)">Cinematic</button>
          </div>
        </div>
        <div class="opt-row">
          <div class="opt-label">Subtitles</div>
          <div class="seg-control" id="opt-subtitles" data-value="off">
            <button class="seg-btn active" data-val="off" onclick="setSeg(this)">Off</button>
            <button class="seg-btn" data-val="on" onclick="setSeg(this)">On</button>
          </div>
        </div>
      </div>
      <button id="generate-btn" onclick="submitDemo()">Generate Demo</button>
    </div>

    <!-- Progress -->
    <div id="progress-section" class="section hidden">
      <div class="status-bar">
        <div class="spinner" id="spinner"></div>
        <span class="status-text" id="status-text">Starting...</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
      <div id="memory-badge" class="memory-badge hidden">
        <span id="memory-text"></span>
        <a href="https://www.trychroma.com" target="_blank" rel="noopener">ChromaDB</a>
      </div>
      <h2>Action Plan</h2>
      <ul class="step-list" id="step-list"></ul>
    </div>

    <!-- Result -->
    <div id="result-section" class="section hidden">
      <h2>Your Demo</h2>
      <video id="video-player" controls></video>
      <div class="btn-row">
        <a id="download-link" href="#" download><button class="btn-secondary">Download Video</button></a>
        <button onclick="resetForm()">Generate Another</button>
      </div>
    </div>

    <!-- Error -->
    <div id="error-section" class="error-banner hidden">
      <strong>Error:</strong> <span id="error-text"></span>
      <div class="btn-row"><button onclick="resetForm()">Try Again</button></div>
    </div>

    <footer>
      Built by <a href="https://www.linkedin.com/in/lorenjphillips/" target="_blank" rel="noopener">Loren Phillips</a><span>, </span><a href="https://www.linkedin.com/in/yonge-bai/" target="_blank" rel="noopener">Yonge Bai</a><span> & </span><span>Tokens</span>
    </footer>
  </div>

  <script>
    let currentJobId = null;
    let pollTimer = null;

    function setSeg(btn) {
      const parent = btn.parentElement;
      parent.querySelectorAll('.seg-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      parent.dataset.value = btn.dataset.val;
    }

    function setMusic(btn) {
      const parent = btn.parentElement;
      parent.querySelectorAll('.music-pill').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      parent.dataset.value = btn.dataset.val;
    }

    function getOptions() {
      const opts = {};
      const quality = document.getElementById('opt-quality').dataset.value;
      if (quality !== 'medium') opts.videoQuality = quality;
      const speed = document.getElementById('opt-speed').dataset.value;
      if (speed !== 'normal') opts.speed = speed;
      if (document.getElementById('opt-subtitles').dataset.value === 'on') opts.subtitles = true;
      const music = document.getElementById('opt-music').dataset.value;
      if (music) opts.backgroundMusic = music;
      return Object.keys(opts).length > 0 ? opts : undefined;
    }

    async function submitDemo() {
      const siteUrl = document.getElementById('site-url').value.trim();
      const demoTask = document.getElementById('demo-task').value.trim();

      if (!siteUrl || !demoTask) return alert('Please fill in both fields.');

      // Disable form
      document.getElementById('generate-btn').disabled = true;
      document.getElementById('site-url').disabled = true;
      document.getElementById('demo-task').disabled = true;

      // Show progress
      document.getElementById('progress-section').classList.remove('hidden');
      document.getElementById('result-section').classList.add('hidden');
      document.getElementById('error-section').classList.add('hidden');
      document.getElementById('status-text').textContent = 'Submitting...';
      document.getElementById('step-list').innerHTML = '';
      document.getElementById('progress-fill').style.width = '0%';

      try {
        const res = await fetch('/demos', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ siteUrl, demoTask, options: getOptions() }),
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.error || `HTTP ${res.status}`);
        }

        const data = await res.json();
        currentJobId = data.id;
        document.getElementById('status-text').textContent = 'Generating action plan...';

        // Start polling
        pollTimer = setInterval(pollJob, 2000);
      } catch (err) {
        showError(err.message);
      }
    }

    async function pollJob() {
      if (!currentJobId) return;

      try {
        const res = await fetch(`/demos/${currentJobId}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const job = await res.json();

        // Update status text
        const statusLabels = {
          planning: 'Generating action plan...',
          executing: 'Executing in browser...',
          encoding: 'Encoding video...',
          done: 'Done!',
          failed: 'Failed',
        };
        document.getElementById('status-text').textContent = statusLabels[job.status] || job.status;

        // Show memory badge if similar demos were found
        if (job.similarDemosFound > 0) {
          document.getElementById('memory-badge').classList.remove('hidden');
          document.getElementById('memory-text').textContent =
            `Memory: ${job.similarDemosFound} similar demo${job.similarDemosFound > 1 ? 's' : ''} used as context`;
        }

        // Render plan steps
        if (job.plan && job.plan.length > 0) {
          renderSteps(job.plan, job.progress);
        }

        // Update progress bar
        if (job.progress && job.plan) {
          const pct = Math.round(((job.progress.currentStep + 1) / job.plan.length) * 100);
          document.getElementById('progress-fill').style.width = pct + '%';
        } else if (job.status === 'planning') {
          document.getElementById('progress-fill').style.width = '5%';
        } else if (job.status === 'encoding') {
          document.getElementById('progress-fill').style.width = '90%';
        }

        // Done
        if (job.status === 'done') {
          clearInterval(pollTimer);
          document.getElementById('progress-fill').style.width = '100%';
          document.getElementById('spinner').classList.add('hidden');
          showResult(job);
        }

        // Failed
        if (job.status === 'failed') {
          clearInterval(pollTimer);
          showError(job.error || 'Unknown error');
        }
      } catch (err) {
        // Network error — keep polling
      }
    }

    function renderSteps(plan, progress) {
      const currentIdx = progress ? progress.currentStep : -1;
      const list = document.getElementById('step-list');
      list.innerHTML = plan.map((step, i) => {
        let cls = 'pending';
        let icon = '○';
        if (i < currentIdx) { cls = 'done'; icon = '✓'; }
        else if (i === currentIdx) { cls = 'current'; icon = '▸'; }

        let label = '';
        if (step.action === 'goto') label = `Navigate to ${step.url}`;
        else if (step.action === 'act') label = step.instruction;
        else if (step.action === 'scroll') label = `Scroll ${step.direction} ${step.pixels || 400}px`;
        else if (step.action === 'wait') label = `Wait ${step.seconds}s`;

        return `<li class="${cls}"><span class="step-icon">${icon}</span>${i + 1}. ${label}</li>`;
      }).join('');
    }

    function showResult(job) {
      const videoUrl = `/demos/${job.id}/video`;
      document.getElementById('video-player').src = videoUrl;
      document.getElementById('download-link').href = videoUrl;
      document.getElementById('result-section').classList.remove('hidden');
    }

    function showError(msg) {
      clearInterval(pollTimer);
      document.getElementById('error-text').textContent = msg;
      document.getElementById('error-section').classList.remove('hidden');
      document.getElementById('spinner').classList.add('hidden');
      document.getElementById('generate-btn').disabled = false;
      document.getElementById('site-url').disabled = false;
      document.getElementById('demo-task').disabled = false;
    }

    function resetForm() {
      currentJobId = null;
      clearInterval(pollTimer);
      document.getElementById('progress-section').classList.add('hidden');
      document.getElementById('result-section').classList.add('hidden');
      document.getElementById('error-section').classList.add('hidden');
      document.getElementById('memory-badge').classList.add('hidden');
      document.getElementById('spinner').classList.remove('hidden');
      document.getElementById('generate-btn').disabled = false;
      document.getElementById('site-url').disabled = false;
      document.getElementById('demo-task').disabled = false;
    }
  </script>
</body>
</html>
